version: 2

updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      time: "05:00"
      timezone: America/Chicago
    labels:
      - dependencies
      - nuget
    groups:
      nuget-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      time: "05:00"
      timezone: America/Chicago
    labels:
      - dependencies
      - actions
    groups:
      github-actions-dependencies:
        patterns:
          - "*"
